run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosec
    - goimports
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  goimports:
    local-prefixes: origin-service
